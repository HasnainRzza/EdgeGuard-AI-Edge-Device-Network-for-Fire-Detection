global:
  scrape_interval: 5s

rule_files:
  - '/etc/prometheus/alert.rules'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']

  # FastAPI inference server – exposes /metrics
  - job_name: 'edgeguard_api'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: '/metrics'
